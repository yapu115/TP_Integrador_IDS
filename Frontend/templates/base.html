<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body{% block body_attr %}{% endblock %}>

{% block page %}
    <div class="app-layout">
    
        <aside class="sidebar">
            <nav class="sidebar__nav">
                <a href="{{ url_for('home.home') }}" class="sidebar__link" title="Inicio">
                    <div class="sidebar__box">&#127968;</div>
                </a>
                <a href="{{ url_for('evaluaciones.mostrar_evaluaciones') }}" class="sidebar__link" title="Evaluaciones">
                    <div class="sidebar__box">&#128197;</div>
                </a>
                <a href="{{ url_for('notas.mostrar_notas') }}" class="sidebar__link" title="Notas">
                    <div class="sidebar__box">&#128203;</div>
                </a>
                <a href="{{ url_for('alumnos.alumnos') }}" class="sidebar__link" title="Alumnos">
                    <div class="sidebar__box">&#128100;</div>
                </a>
                <a href="{{ url_for('grupos.grupos') }}" class="sidebar__link" title="Grupos">
                    <div class="sidebar__box">&#128101;</div>
                </a>
                <a href="{{ url_for('asistencia.asistencia') }}" class="sidebar__link" title="Asistencia">
                    <div class="sidebar__box">&#128196;</div>
                </a>
                <a href="{{ url_for('dashboard.dashboard') }}" class="sidebar__link" title="Dashboard">
                    <div class="sidebar__box">&#128202;</div>
                </a>
                <a href="{{ url_for('materiales.materiales') }}" class="sidebar__link" title="Materiales">
                    <div class="sidebar__box">&#128218;</div>
                </a>
            </nav>
        </aside>
    
        <div class="app-container">
            
            <header class="topbar">
                <button class="topbar__menu-btn">
                    &#9776;
                </button>
                
                <nav class="breadcrumbs" aria-label="Breadcrumb">
                    {% block breadcrumbs %}
                    {% endblock %}
                </nav>

                <form action="{{ url_for('auth.logout') }}" method="POST" class="topbar__actions">
                    <button type="submit" class="btn-logout" title="Cerrar sesión">
                        &#128682;
                    </button>
                </form>
            </header>
            
            <main class="main-content">
                {% block content %}{% endblock %}
            </main>

        </div>
    </div>
{% endblock %}

    {% block extra_js %}<script src="{{ url_for('static', filename='js/base.js') }}"></script>{% endblock %}
</body>
</html>
