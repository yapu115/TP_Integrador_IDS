<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
    />
  </head>
  <body class="auth-page">
    <div class="auth-shell">
      <section class="auth-card">
        <div
          class="auth-panel-image auth-panel-image--login"
          role="img"
          aria-label="Facultad"
        ></div>

        <form
          class="auth-panel-form"
          method="POST"
          action="{{ url_for('auth.login') }}"
        >
          <h1>Iniciar Sesión</h1>

          {% if error %}
          <p class="auth-message auth-message--error">{{ error }}</p>
          {% endif %}

          <div class="form-group">
            <label for="username">Email o usuario</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Email"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Contraseña"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="auth-submit">Iniciar sesión</button>

          <p class="auth-footer-link">
            ¿No tenés cuenta?
            <a href="{{ url_for('auth.registrar') }}">Registrate aquí</a>
          </p>
        </form>
      </section>
    </div>
  </body>
</html>
