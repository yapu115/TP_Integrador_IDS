<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
    />
  </head>
  <body class="auth-page">
    <div class="auth-shell">
      <section class="auth-card auth-card--register">
        <form
          class="auth-panel-form"
          method="POST"
          action="{{ url_for('auth.registrar') }}"
        >
          <h1>Registrarse</h1>

          {% if error %}
          <p class="auth-message auth-message--error">{{ error }}</p>
          {% endif %} {% if exito %}
          <p class="auth-message auth-message--success">{{ exito }}</p>
          {% endif %}

          <div class="auth-form-row">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Nombre"
                required
                autocomplete="given-name"
              />
            </div>
            <div class="form-group">
              <label for="apellido">Apellido</label>
              <input
                type="text"
                id="apellido"
                name="apellido"
                placeholder="Apellido"
                required
                autocomplete="family-name"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Contraseña"
              required
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label for="confirmar_password">Confirmar contraseña</label>
            <input
              type="password"
              id="confirmar_password"
              name="confirmar_password"
              placeholder="Confirmar contraseña"
              required
              autocomplete="new-password"
            />
          </div>

          <button type="submit" class="auth-submit">Registrarse</button>

          <p class="auth-footer-link">
            ¿Ya tenés cuenta?
            <a href="{{ url_for('auth.login') }}">Iniciar sesión</a>
          </p>
        </form>

        <div
          class="auth-panel-image auth-panel-image--register"
          role="img"
          aria-label="Facultad"
        ></div>
      </section>
    </div>
  </body>
</html>
