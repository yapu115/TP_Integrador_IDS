<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de usuario</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/registrar.css') }}">
</head>
<body>

    <main class="registro-container">
        <section class="registro-card">

            <div class="registro-info">
                <h1>Crear cuenta</h1>
                <p>Registrá un nuevo usuario para acceder a la plataforma del curso.</p>
            </div>

            <form class="registro-form" method="POST" action="/registrar">
                <h2>Registro</h2>

                {% if error %}
                    <p class="mensaje error">{{ error }}</p>
                {% endif %}

                {% if exito %}
                    <p class="mensaje exito">{{ exito }}</p>
                {% endif %}

                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        placeholder="Ingrese el nombre completo"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="ejemplo@correo.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input 
                        type="text" 
                        id="usuario" 
                        name="usuario" 
                        placeholder="Ingrese un nombre de usuario"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Ingrese una contraseña"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirmar_password">Confirmar contraseña</label>
                    <input 
                        type="password" 
                        id="confirmar_password" 
                        name="confirmar_password" 
                        placeholder="Repita la contraseña"
                        required
                    >
                </div>

                <button type="submit">Registrarse</button>

                <p class="login-link">
                    ¿Ya tenés cuenta?
                    <a href="/login">Iniciar sesión</a>
                </p>
            </form>

        </section>
    </main>

</body>
</html>
